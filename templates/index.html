<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Log</title>
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --ink: #2e2c28;
      --ink-soft: #6b6862;
      --line: #e3e0da;
      --accent: #5b7065;
      --accent-soft: #eef2ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 28px 24px;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .sub {
      font-size: 0.85rem;
      color: var(--ink-soft);
      margin: 0 0 24px;
    }
    .flash {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-soft);
      margin: 18px 0 6px;
      letter-spacing: 0.01em;
    }
    label:first-of-type { margin-top: 0; }
    input[type="date"],
    input[type="time"],
    textarea {
      width: 100%;
      font-size: 1rem;
      font-family: inherit;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }
    textarea {
      resize: vertical;
      min-height: 84px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .vibes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .vibes input { display: none; }
    .vibes label {
      margin: 0;
      font-weight: 500;
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
    }
    .vibes input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button {
      width: 100%;
      margin-top: 26px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Daily Log</h1>
    <p class="sub">Quick entry — takes about 15 seconds.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('submit') }}" method="POST">
      <div class="row2">
        <div>
          <label for="date">Date</label>
          <input type="date" id="date" name="date" value="{{ today }}">
        </div>
        <div>
          <label for="time">Time (optional)</label>
          <input type="time" id="time" name="time" placeholder="{{ now_time }}">
        </div>
      </div>

      <label for="entry">Entry</label>
      <textarea id="entry" name="entry" placeholder="What happened..." required></textarea>

      <label>Vibes</label>
      <div class="vibes">
        {% for option in vibe_options %}
          <input type="radio" id="vibe-{{ loop.index }}" name="vibes" value="{{ option }}" {% if loop.first %}checked{% endif %}>
          <label for="vibe-{{ loop.index }}">{{ option }}</label>
        {% endfor %}
      </div>

      <button type="submit">Log it</button>
    </form>
  </div>
</body>
</html>
